# Build this repo and publish the static export to the separate
# kshitijpwr04.github.io repo, so the site is served at the root domain.
name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the main branch
  push:
    branches: ["main"]
  # Allows manual deployment from Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build
        env:
          NODE_ENV: production
          # Use environment variable for GA tracking ID
          NEXT_PUBLIC_GA_TRACKING_ID: ${{ vars.NEXT_PUBLIC_GA_TRACKING_ID }}
          # No NEXT_PUBLIC_BASE_PATH here - this deploys to the root of
          # kshitijpwr04.github.io, not a project subpath.

      - name: Verify build output
        run: |
          if [ ! -d "out" ]; then
            echo "Error: 'out' directory not found. Static export failed."
            exit 1
          fi
          echo "Build successful. Generated $(find out -type f | wc -l) files."
          du -sh out/

      - name: Ensure .nojekyll exists in output
        run: |
          if [ ! -f "out/.nojekyll" ]; then
            cp public/.nojekyll out/.nojekyll || touch out/.nojekyll
          fi

      # Requires a repo secret DEPLOY_PAT: a token with write access to
      # kshitijpwr04/kshitijpwr04.github.io (this workflow's default
      # GITHUB_TOKEN only has access to *this* repo, not that one).
      - name: Push build output to kshitijpwr04.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_PAT }}
          external_repository: kshitijpwr04/kshitijpwr04.github.io
          publish_branch: main
          publish_dir: ./out
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy ${{ github.sha }}"
